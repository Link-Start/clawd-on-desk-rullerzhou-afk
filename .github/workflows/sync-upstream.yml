name: Sync Upstream

on:
  schedule:
    # Run daily at 02:00 UTC (10:00 Beijing time)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/rullerzhou-afk/clawd-on-desk.git || true
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "commits_behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync main branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git checkout main
          git merge upstream/main --no-edit || {
            echo "Merge conflict detected. Creating PR instead."
            exit 1
          }
          git push origin main
        continue-on-error: true

      - name: Create sync PR on conflict
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M)"
          COMMITS_BEHIND="${{ steps.check.outputs.commits_behind }}"
          
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true

          # Check if there are conflicts
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Conflicts detected:"
            git diff --name-only --diff-filter=U

            # Abort the merge and create a PR
            git merge --abort
            git checkout main
            git checkout -b "$BRANCH"
            git pull upstream main --no-edit --no-rebase || true
            git push origin "$BRANCH"

            gh pr create \
              --title "chore: sync upstream $(date +%Y-%m-%d)" \
              --body "Automated sync from upstream \`rullerzhou-afk/clawd-on-desk\` detected conflicts. Please resolve manually.

**Commits behind**: $COMMITS_BEHIND
**Upstream**: https://github.com/rullerzhou-afk/clawd-on-desk/commits/main" \
              --base main \
              --head "$BRANCH" || echo "PR creation failed or already exists"
          fi

      - name: Summary
        if: always()
        run: |
          HAS_UPDATES="${{ steps.check.outputs.has_updates }}"
          COMMITS_BEHIND="${{ steps.check.outputs.commits_behind }}"
          JOB_STATUS="${{ job.status }}"
          
          if [ "$HAS_UPDATES" == "false" ]; then
            echo "✅ Already up to date with upstream"
          elif [ "$JOB_STATUS" == "success" ]; then
            echo "✅ Successfully synced $COMMITS_BEHIND commits from upstream"
          else
            echo "⚠️ Sync had conflicts - PR created for manual resolution"
          fi
